version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fpo_mysql
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: fpo_db
      MYSQL_USER: fpo_user
      MYSQL_PASSWORD: fpo_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
